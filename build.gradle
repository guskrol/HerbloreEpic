buildscript {
    configurations {
        classpath {
            resolutionStrategy.cacheDynamicVersionsFor(0, 'minutes')
        }
    }
    repositories {
        mavenCentral()
        maven {
            url = uri("https://gitlab.epicbot.com/api/v4/projects/3/packages/maven")
        }
    }
    dependencies {
        classpath("com.epicbot:epicbot-gradle-plugin:+")
    }
}

apply plugin: 'epicbot-gradle-plugin'
